<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Anime Stream</title>
  <style>
    /* Tema Gelap (Dark Theme) */
    :root {
      --bg-color: #121212;
      --surface-color: #1e1e1e;
      --surface-hover: #2a2a2a;
      --text-main: #ffffff;
      --text-muted: #a0a0a0;
      --accent: #ffcc00; 
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
    }

    header {
      width: 100%;
      padding: 20px 0;
      background-color: var(--surface-color);
      text-align: center;
      border-bottom: 2px solid var(--accent);
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      cursor: pointer;
    }

    header h1 {
      margin: 0;
      font-size: 1.5rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .container {
      max-width: 1100px;
      width: 90%;
      margin: 40px auto;
    }

    .hidden {
      display: none !important;
    }

    /* --- GAYA HOME MENU --- */
    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      margin-top: 20px;
    }

    .anime-card {
      background-color: var(--surface-color);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .anime-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.5);
    }

    .anime-cover {
      width: 100%;
      height: 160px;
      background-color: #000;
      object-fit: cover;
    }

    .anime-info {
      padding: 15px;
    }

    .anime-card-title {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .anime-card-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 15px;
    }

    .episode-select {
      width: 100%;
      padding: 10px;
      background-color: var(--bg-color);
      color: var(--text-main);
      border: 1px solid #333;
      border-radius: 6px;
      outline: none;
      cursor: pointer;
    }

    /* --- GAYA PLAYER VIEW --- */
    .player-nav-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .btn-action {
      background-color: var(--surface-color);
      color: var(--text-main);
      border: 1px solid var(--text-muted);
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s, border-color 0.2s;
    }

    .btn-action:hover:not(:disabled) {
      background-color: var(--surface-hover);
      border-color: var(--accent);
    }

    .btn-action:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .player-header {
      margin-bottom: 20px;
    }

    .player-anime-title {
      font-size: 1.8rem;
      font-weight: bold;
    }

    .player-episode-title {
      font-size: 1.2rem;
      color: var(--accent);
      margin-top: 5px;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 16:9 */
      background-color: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      outline: none;
    }

    /* Kontrol Prev/Next di bawah video */
    .player-controls-bottom {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <header onclick="showHomeView()">
    <h1>Vexlstream</h1>
  </header>

  <div class="container">
    
    <div id="home-view">
      <h2 style="margin-bottom: 10px;">Koleksi Anime</h2>
      <div class="anime-grid" id="anime-container">
        </div>
    </div>

    <div id="player-view" class="hidden">
      
      <div class="player-nav-top">
        <button class="btn-action" onclick="showHomeView()">← Kembali ke Menu</button>
      </div>
      
      <div class="player-header">
        <div id="display-anime-title" class="player-anime-title">Nama Anime</div>
        <div id="display-episode-title" class="player-episode-title">Nama Episode</div>
      </div>

      <div class="video-wrapper">
        <video id="main-player" controls preload="metadata">
          <source id="video-source" src="" type="video/mp4">
          Browser Anda tidak mendukung pemutar video ini.
        </video>
      </div>

      <div class="player-controls-bottom">
        <button id="btn-prev" class="btn-action" onclick="playPrevEpisode()">⏮ Episode Sebelumnya</button>
        <button id="btn-next" class="btn-action" onclick="playNextEpisode()">Episode Selanjutnya ⏭</button>
      </div>

    </div>

  </div>

  <script>
    // ==========================================
    // VARIABEL GLOBAL UNTUK TRACKING EPISODE
    // ==========================================
    let currentAnimeIndex = null;
    let currentEpisodeIndex = null;

    // ==========================================
    // DATA ANIME & TEMPLATE EPISODE
    // ==========================================
    const ANIME_CATALOG = [
      {
        id: "turn-a-gundam",
        title: "Turn A Gundam",
        meta: "Sci-Fi, Mecha • 1999 • Yoshiyuki Tomino",
        cover: "https://img.mandarake.co.jp/aucimg/7/3/3/5/0001727335.octet-stream",
        episodes: [
          { title: "Episode 1: Howl at the Moon", fileId: "1cOzKMoX8ATciFq6TNdg3RPuXjpRHtLlg" },
          { title: "Episode 2: The Coming of Age Ceremony", fileId: "18ZQmBNTwpExS4Hv7M5yJwCCj6OI9JNtY" },
          { title: "Episode 3", fileId: "" },
          { title: "Episode 4", fileId: "" },
          { title: "Episode 5", fileId: "" },
          { title: "Episode 6", fileId: "" },
          { title: "Episode 7", fileId: "" },
          { title: "Episode 8", fileId: "" },
          { title: "Episode 9", fileId: "" },
          { title: "Episode 10", fileId: "" },
          { title: "Episode 11", fileId: "" },
          { title: "Episode 12", fileId: "" },
          { title: "Episode 13", fileId: "" },
          { title: "Episode 14", fileId: "" },
          { title: "Episode 15", fileId: "" },
          { title: "Episode 16", fileId: "" },
          { title: "Episode 17", fileId: "" },
          { title: "Episode 18", fileId: "" },
          { title: "Episode 19", fileId: "" },
          { title: "Episode 20", fileId: "" },
          { title: "Episode 21", fileId: "" },
          { title: "Episode 22", fileId: "" },
          { title: "Episode 23", fileId: "" },
          { title: "Episode 24", fileId: "" },
          { title: "Episode 25", fileId: "" }
        ]
      }
    ];

    // ==========================================
    // FUNGSI-FUNGSI LOGIKA
    // ==========================================

    function renderCatalog() {
      const container = document.getElementById('anime-container');
      container.innerHTML = ''; 

      ANIME_CATALOG.forEach((anime, animeIndex) => {
        let episodeOptions = `<option value="" disabled selected>Pilih Episode...</option>`;
        
        anime.episodes.forEach((ep, epIndex) => {
          // Hanya tampilkan opsi jika fileId sudah diisi
          if(ep.fileId !== "") {
            episodeOptions += `<option value="${animeIndex}-${epIndex}">${ep.title}</option>`;
          }
        });

        const cardHTML = `
          <div class="anime-card">
            <img class="anime-cover" src="${anime.cover}" alt="${anime.title}">
            <div class="anime-info">
              <div class="anime-card-title">${anime.title}</div>
              <div class="anime-card-meta">${anime.meta}</div>
              <select class="episode-select" onchange="handleEpisodeSelect(this)">
                ${episodeOptions}
              </select>
            </div>
          </div>
        `;
        container.innerHTML += cardHTML;
      });
    }

    function handleEpisodeSelect(selectElement) {
      if (!selectElement.value) return;

      const [aIndex, eIndex] = selectElement.value.split('-');
      currentAnimeIndex = parseInt(aIndex);
      currentEpisodeIndex = parseInt(eIndex);

      loadVideoPlayer();
      selectElement.value = ""; // Reset dropdown
    }

    function loadVideoPlayer() {
      const anime = ANIME_CATALOG[currentAnimeIndex];
      const episode = anime.episodes[currentEpisodeIndex];

      // Update Teks Judul
      document.getElementById('display-anime-title').innerText = anime.title;
      document.getElementById('display-episode-title').innerText = episode.title;

      // Update Video Player
      const player = document.getElementById('main-player');
      const source = document.getElementById('video-source');
      source.src = `/api/stream?fileId=${episode.fileId}`;
      
      player.load();
      player.play();

      // Update status tombol Prev & Next
      updateNavButtons();

      // Tukar tampilan
      document.getElementById('home-view').classList.add('hidden');
      document.getElementById('player-view').classList.remove('hidden');
    }

    function updateNavButtons() {
      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');
      const anime = ANIME_CATALOG[currentAnimeIndex];

      // Disable tombol "Prev" jika ini episode pertama
      btnPrev.disabled = (currentEpisodeIndex === 0);

      // Disable tombol "Next" jika ini episode terakhir ATAU episode selanjutnya belum ada fileId-nya
      const isLastEpisode = (currentEpisodeIndex === anime.episodes.length - 1);
      const nextEpisodeHasId = !isLastEpisode && (anime.episodes[currentEpisodeIndex + 1].fileId !== "");
      
      btnNext.disabled = isLastEpisode || !nextEpisodeHasId;
    }

    function playPrevEpisode() {
      if (currentEpisodeIndex > 0) {
        currentEpisodeIndex--;
        loadVideoPlayer();
      }
    }

    function playNextEpisode() {
      const anime = ANIME_CATALOG[currentAnimeIndex];
      if (currentEpisodeIndex < anime.episodes.length - 1) {
        currentEpisodeIndex++;
        loadVideoPlayer();
      }
    }

    function showHomeView() {
      const player = document.getElementById('main-player');
      player.pause(); 

      document.getElementById('player-view').classList.add('hidden');
      document.getElementById('home-view').classList.remove('hidden');
      
      // Reset variabel
      currentAnimeIndex = null;
      currentEpisodeIndex = null;
    }

    window.onload = renderCatalog;
  </script>
</body>
</html>
